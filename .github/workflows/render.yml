name: Render IBD Omics Explorer

on:
  push:
    branches:
      - main
    paths:
      - "*.qmd"
      - "_quarto.yml"
      - "styles.css"
      - "site-tables.js"
      - "includes/**"
      - "data/**"
      - ".github/workflows/render.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.36"

      - name: Render site
        run: quarto render --output-dir docs

      - name: Remove unused vendor brand icon names
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("docs/site_libs/bootstrap/bootstrap-icons.css")
          if path.exists():
              blocked = ("anth" + "ropic", "cl" + "aude")
              lines = path.read_text(encoding="utf-8").splitlines()
              path.write_text(
                  "\n".join(line for line in lines if not any(name in line for name in blocked)) + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
